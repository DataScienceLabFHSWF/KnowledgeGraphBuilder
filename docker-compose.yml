# KnowledgeGraphBuilder — Standalone Docker Compose
#
# Brings up all infrastructure + the KGB API in one command.
# Models are pulled automatically on first run.
#
# Usage:
#   docker compose up -d              # start everything
#   docker compose up -d --build      # rebuild API image + start
#   docker compose logs -f kgb-api    # follow API logs
#
# When running inside KGPlatform, this file is NOT used.
# KGPlatform's root docker-compose.yml handles everything.

services:
  # ── KGBuilder API ──────────────────────────────────────────
  kgb-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: kgb-api
    restart: unless-stopped
    ports:
      - "${UVICORN_PORT:-8001}:8001"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://kgb-qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-kgbuilder}
      - NEO4J_URI=bolt://kgb-neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - FUSEKI_URL=http://kgb-fuseki:3030
      - FUSEKI_DATASET=${FUSEKI_DATASET:-kgbuilder}
      - OLLAMA_URL=http://kgb-ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
      - GRAPHQA_API_URL=${GRAPHQA_API_URL:-}
      - ONTOLOGY_API_URL=${ONTOLOGY_API_URL:-}
    depends_on:
      kgb-ollama-init:
        condition: service_completed_successfully
      kgb-neo4j:
        condition: service_started
      kgb-qdrant:
        condition: service_started
      kgb-fuseki:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - kgbuilder-net

  # ── KGBuilder CLI runner (optional, for batch runs) ────────
  kgb-runner:
    build: .
    container_name: kgb-runner
    profiles: ["runner"]
    volumes:
      - ./:/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://kgb-qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-kgbuilder}
      - NEO4J_URI=bolt://kgb-neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - FUSEKI_URL=http://kgb-fuseki:3030
      - FUSEKI_DATASET=${FUSEKI_DATASET:-kgbuilder}
      - OLLAMA_URL=http://kgb-ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
    depends_on:
      kgb-ollama-init:
        condition: service_completed_successfully
      kgb-neo4j:
        condition: service_started
      kgb-qdrant:
        condition: service_started
      kgb-fuseki:
        condition: service_started
    networks:
      - kgbuilder-net

  # ── Infrastructure ─────────────────────────────────────────
  kgb-qdrant:
    image: qdrant/qdrant:latest
    container_name: kgb-qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - kgbuilder-net

  kgb-neo4j:
    image: neo4j:5.26.0
    container_name: kgb-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      - NEO4J_PLUGINS=["apoc", "n10s"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,n10s.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,n10s.*
    volumes:
      - ./data/neo4j:/data
      - neo4j-plugins:/plugins
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - kgbuilder-net

  kgb-fuseki:
    image: stain/jena-fuseki:latest
    container_name: kgb-fuseki
    restart: unless-stopped
    ports:
      - "3030:3030"
    volumes:
      - ./data/fuseki:/fuseki
    environment:
      - ADMIN_PASSWORD=${FUSEKI_ADMIN_PASSWORD:-admin}
      - FUSEKI_DATASET_1=${FUSEKI_DATASET:-kgbuilder}
      - FUSEKI_DATASET_2=kgbuilder-staging
    networks:
      - kgbuilder-net

  # ── Ollama + model init ────────────────────────────────────
  kgb-ollama:
    image: ollama/ollama:0.14.3
    container_name: kgb-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_ALLOW_DOWNLOADS=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kgbuilder-net

  kgb-ollama-init:
    image: ollama/ollama:0.14.3
    container_name: kgb-ollama-init
    depends_on:
      kgb-ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=kgb-ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling models for KGBuilder..."
        ollama pull ${OLLAMA_MODEL:-qwen3:8b}
        ollama pull ${OLLAMA_EMBED_MODEL:-qwen3-embedding}
        echo "KGBuilder models ready."
    restart: "no"
    networks:
      - kgbuilder-net

volumes:
  neo4j-plugins:
  ollama-data:

networks:
  kgbuilder-net:
    driver: bridge
