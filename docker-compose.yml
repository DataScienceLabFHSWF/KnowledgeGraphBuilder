version: '3.8'

services:
  kgbuilder:
    build: .
    container_name: kgbuilder
    # Run the KG construction pipeline
    # Override command to pass custom arguments, e.g.:
    #   docker-compose run --rm kgbuilder --questions-per-class 5 --max-iterations 10
    volumes:
      - ./:/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - KGBUILDER_CONFIG=/app/config/config.yaml
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-kgbuilder}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - FUSEKI_URL=${FUSEKI_URL:-http://fuseki:3030}
      - FUSEKI_DATASET=${FUSEKI_DATASET:-kgbuilder}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama-kgbuilder:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
    depends_on:
      - qdrant
      - neo4j
      - fuseki
      - ollama-kgbuilder
    networks:
      - kgbuilder-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - kgbuilder-net

  neo4j:
    image: neo4j:5.26.0
    container_name: neo4j
    restart: unless-stopped
    environment:
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_AUTH=neo4j/changeme
      # Install APOC and Neosemantics (n10s) plugins
      - NEO4J_PLUGINS=["apoc", "n10s"]
      # Allow APOC to call external URLs and use import/export
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,n10s.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,n10s.*
    volumes:
      - ./data/neo4j:/data
      - neo4j-plugins:/plugins
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - kgbuilder-net

  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fuseki
    restart: unless-stopped
    ports:
      - "3030:3030"
    volumes:
      - ./data/fuseki:/fuseki
    environment:
      - ADMIN_PASSWORD=admin
    networks:
      - kgbuilder-net

  ollama:
    image: ollama/ollama:0.14.3
    container_name: ollama-kgbuilder
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_ALLOW_DOWNLOADS=true
    networks:
      - kgbuilder-net

  # FastAPI service wrapping the KG construction pipeline
  kgbuilder-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: kgbuilder-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./:/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-kgbuilder}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - FUSEKI_URL=${FUSEKI_URL:-http://fuseki:3030}
      - FUSEKI_DATASET=${FUSEKI_DATASET:-kgbuilder}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama-kgbuilder:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
      - GRAPHQA_API_URL=${GRAPHQA_API_URL:-http://graphqa-api:8002}
      - ONTOLOGY_API_URL=${ONTOLOGY_API_URL:-http://ontology-api:8003}
    depends_on:
      - qdrant
      - neo4j
      - fuseki
    networks:
      - kgbuilder-net

volumes:
  neo4j-plugins:
  ollama-data:

networks:
  kgbuilder-net:
    driver: bridge
